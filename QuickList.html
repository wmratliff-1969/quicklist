<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Quick List">
<title>Quick List</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', sans-serif; background: #f0f4ff; min-height: 100vh; padding-bottom: 40px; }
  .app { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
  .header { background: #1877F2; color: white; padding: 52px 24px 20px; text-align: center; }
  .header h1 { font-size: 28px; font-weight: 800; }
  .header p { font-size: 15px; opacity: 0.88; margin-top: 5px; }
  .content { flex: 1; padding: 28px 20px; display: flex; flex-direction: column; gap: 22px; }
  .section-label { font-size: 18px; font-weight: 800; color: #1a1a2e; margin-bottom: 12px; }
  .photo-drop { border: 3px dashed #c5cae9; border-radius: 20px; background: #f5f5ff; min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
  .photo-drop img { width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0; border-radius: 17px; }
  .photo-drop-inner { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 24px; }
  .camera-icon { width: 80px; height: 80px; background: #e8f0fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; }
  .photo-drop-inner p { font-size: 20px; font-weight: 800; color: #1877F2; }
  .photo-drop-inner span { font-size: 15px; color: #888; }
  input[type="file"] { display: none; }
  .btn-analyze { width: 100%; padding: 22px; background: #1877F2; color: white; border: none; border-radius: 18px; font-size: 22px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; -webkit-appearance: none; }
  .btn-analyze:disabled { background: #b0bec5; }
  .results-card { background: white; border: 2px solid #e0e0e0; border-radius: 20px; overflow: hidden; display: none; }
  .results-header { background: #e8f5e9; padding: 16px 20px; font-size: 17px; font-weight: 800; color: #2e7d32; }
  .result-field { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
  .result-field:last-child { border-bottom: none; }
  .result-field label { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
  .result-field input[type="text"], .result-field input[type="number"] { display: block; width: 100%; border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 12px 14px; font-size: 17px; font-family: 'Nunito', sans-serif; font-weight: 600; outline: none; color: #1a1a2e; -webkit-appearance: none; }
  .result-field textarea { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 12px 14px; font-size: 16px; font-family: 'Nunito', sans-serif; line-height: 1.6; resize: vertical; outline: none; color: #1a1a2e; min-height: 110px; -webkit-appearance: none; }
  .price-row { display: flex; align-items: center; gap: 10px; }
  .price-row span { font-size: 26px; font-weight: 800; color: #2e7d32; }
  .price-row input { border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 12px 14px; font-size: 24px; font-weight: 800; font-family: 'Nunito', sans-serif; color: #2e7d32; width: 140px; outline: none; -webkit-appearance: none; }
  .badge { display: inline-block; background: #e8f0fe; color: #1565c0; font-size: 14px; font-weight: 700; padding: 5px 14px; border-radius: 20px; }
  .btn-copy { width: 100%; padding: 22px; background: #2e7d32; color: white; border: none; border-radius: 18px; font-size: 22px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; display: none; align-items: center; justify-content: center; gap: 10px; -webkit-appearance: none; }
  .copied-msg { text-align: center; font-size: 17px; font-weight: 800; color: #2e7d32; padding: 16px; background: #e8f5e9; border-radius: 14px; display: none; }
  .btn-reset { width: 100%; padding: 18px; background: transparent; color: #888; border: 2px solid #e0e0e0; border-radius: 18px; font-size: 18px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; display: none; -webkit-appearance: none; }
  .loading-dots { display: inline-flex; gap: 5px; }
  .loading-dots span { width: 11px; height: 11px; background: white; border-radius: 50%; animation: bounce 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.6;}40%{transform:translateY(-8px);opacity:1;} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📦 Quick List</h1>
    <p>Take a photo — AI writes the listing!</p>
  </div>
  <div class="content">
    <div>
      <div class="section-label">📷 Take a Photo of Your Item</div>
      <div class="photo-drop" id="photoDrop" onclick="document.getElementById('fileInput').click()">
        <div class="photo-drop-inner" id="dropInner">
          <div class="camera-icon">📷</div>
          <p>Tap Here to Take Photo</p>
          <span>or choose from your gallery</span>
        </div>
        <img id="previewImg" style="display:none;" />
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handlePhoto(event)" />
    </div>
    <button class="btn-analyze" id="analyzeBtn" onclick="analyzePhoto()" disabled>
      <span id="analyzeBtnText">🔍 Analyze My Item</span>
    </button>
    <div class="results-card" id="resultsCard">
      <div class="results-header">✅ Your Listing is Ready — Change Anything You Like</div>
      <div class="result-field">
        <label>Title</label>
        <input type="text" id="resTitle" />
      </div>
      <div class="result-field">
        <label>Category</label>
        <span class="badge" id="resCategoryBadge"></span>
      </div>
      <div class="result-field">
        <label>Condition</label>
        <input type="text" id="resCondition" />
      </div>
      <div class="result-field">
        <label>Suggested Price</label>
        <div class="price-row">
          <span>$</span>
          <input type="number" id="resPrice" min="0" step="1" />
        </div>
      </div>
      <div class="result-field">
        <label>Description — Ready to Paste into Facebook</label>
        <textarea id="resDescription" rows="5"></textarea>
      </div>
    </div>
    <button class="btn-copy" id="copyBtn" onclick="copyListing()">
      📋 Copy &amp; Paste into Facebook
    </button>
    <div class="copied-msg" id="copiedMsg">✅ Copied! Open Facebook Marketplace and paste it in!</div>
    <button class="btn-reset" id="resetBtn" onclick="resetApp()">🔄 List Another Item</button>
  </div>
</div>

<script>
  const API_KEY = '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';
  let photoBase64 = null;
  let photoType = 'image/jpeg';

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    photoType = file.type || 'image/jpeg';
    
    // Resize image before sending to keep it under limits
    const img = new Image();
    const reader = new FileReader();
    reader.onload = function(ev) {
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const MAX = 1024;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        photoBase64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
        photoType = 'image/jpeg';
        
        const previewImg = document.getElementById('previewImg');
        previewImg.src = ev.target.result;
        previewImg.style.display = 'block';
        document.getElementById('dropInner').style.display = 'none';
        document.getElementById('photoDrop').style.minHeight = '250px';
        document.getElementById('analyzeBtn').disabled = false;
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function analyzePhoto() {
    if (!photoBase64) return;
    const btn = document.getElementById('analyzeBtn');
    const btnText = document.getElementById('analyzeBtnText');
    btn.disabled = true;
    btnText.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span> Working on it...';

    const prompt = `You are helping an elderly person list items for sale on Facebook Marketplace. Look at this image carefully and respond ONLY with a JSON object (no markdown, no explanation) in this exact format:
{
  "title": "Short catchy title for FB Marketplace (max 8 words)",
  "category": "Facebook Marketplace category (e.g. Home & Garden, Electronics, Clothing, Toys & Games, Tools, Collectibles, etc.)",
  "condition": "Good / Like New / Fair / For Parts",
  "price": 15,
  "description": "A friendly 3-4 sentence description ready to paste into Facebook Marketplace. Mention what it is, condition, and any notable features. End with Cash only. Local pickup."
}`;

    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000);

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        signal: controller.signal,
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 600,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: photoType, data: photoBase64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      });

      clearTimeout(timeout);

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error?.message || 'API error ' + response.status);
      }

      const data = await response.json();
      const text = data.content[0].text.trim().replace(/```json|```/g, '').trim();
      const result = JSON.parse(text);

      document.getElementById('resTitle').value = result.title || '';
      document.getElementById('resCategoryBadge').textContent = result.category || '';
      document.getElementById('resCondition').value = result.condition || '';
      document.getElementById('resPrice').value = result.price || '';
      document.getElementById('resDescription').value = result.description || '';

      document.getElementById('resultsCard').style.display = 'block';
      document.getElementById('copyBtn').style.display = 'flex';
      document.getElementById('resetBtn').style.display = 'block';
      btnText.innerHTML = '✅ Done!';
      window.scrollTo({ top: document.getElementById('resultsCard').offsetTop - 20, behavior: 'smooth' });

    } catch (err) {
      let msg = 'Something went wrong. Please try again.';
      if (err.name === 'AbortError') msg = 'Request timed out. Please try again.';
      else if (err.message) msg = err.message;
      alert(msg);
      btn.disabled = false;
      btnText.innerHTML = '🔍 Analyze My Item';
    }
  }

  function copyListing() {
    const title = document.getElementById('resTitle').value;
    const price = document.getElementById('resPrice').value;
    const condition = document.getElementById('resCondition').value;
    const category = document.getElementById('resCategoryBadge').textContent;
    const desc = document.getElementById('resDescription').value;
    const listing = `${title}\n\nPrice: $${price}\nCondition: ${condition}\nCategory: ${category}\n\n${desc}`;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(listing).then(showCopied).catch(() => fallbackCopy(listing));
    } else { fallbackCopy(listing); }
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); showCopied(); } catch(e) { alert('Please manually select and copy the description above.'); }
    document.body.removeChild(ta);
  }

  function showCopied() {
    document.getElementById('copiedMsg').style.display = 'block';
    setTimeout(() => { document.getElementById('copiedMsg').style.display = 'none'; }, 5000);
  }

  function resetApp() {
    photoBase64 = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('previewImg').style.display = 'none';
    document.getElementById('dropInner').style.display = 'flex';
    document.getElementById('photoDrop').style.minHeight = '250px';
    document.getElementById('resultsCard').style.display = 'none';
    document.getElementById('copyBtn').style.display = 'none';
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('copiedMsg').style.display = 'none';
    document.getElementById('analyzeBtnText').innerHTML = '🔍 Analyze My Item';
    document.getElementById('analyzeBtn').disabled = true;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
